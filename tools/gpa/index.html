<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPA Calculator</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="gpa-container">
    <h1>GPA Calculator</h1>

    <label for="courseCount">Number of Courses:</label>
    <input type="number" id="courseCount" min="1" max="20" placeholder="Enter total courses">

    <button id="generateCoursesBtn">Generate Courses</button>

    <form id="coursesForm"></form>

    <button id="calculateBtn" onclick="calculateGPA()">Calculate GPA</button>

    <h2 id="result">Your GPA: </h2>
</div>

<script src="script.js"></script>
</body>
</html>
